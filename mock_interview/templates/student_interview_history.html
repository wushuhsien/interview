<style>
    .info-container {
        width: 900px;
        background: rgba(255, 255, 255, 0.95);
        padding: 40px 60px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        margin: 50px auto;
        backdrop-filter: blur(10px);
    }

    .info-container h2 {
        margin-top: 0;
        color: #1e3c72;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        letter-spacing: 2px;
    }

    /* 表格 */
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        overflow: hidden;
        border-radius: 10px;
    }

    /* 表頭 */
    th {
        background: #e3eaf3;
        /* 淡灰藍 */
        color: #2c3e50;
        font-weight: 600;
    }

    /* 儲存格 */
    th,
    td {
        padding: 14px;
        text-align: center;
        border-bottom: 1px solid #eef2f7;
    }

    /* 偶數列 */
    tr:nth-child(even) {
        background-color: #f9fbfd;
    }

    /* hover（變淡，不要太亮） */
    tr:hover {
        background-color: #f1f6fb;
    }

    /* 按鈕（改柔和） */
    .view-btn,
    .download-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 20px;
        background: #6b8bb6;
        /* 柔和藍 */
        color: white;
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
    }

    /* hover 按鈕 */
    .view-btn:hover,
    .download-btn:hover {
        background: #5a7aa3;
    }
</style>

<div class="info-container">

    <h2>面試紀錄</h2>

    <table>
        <thead>
            <tr>
                <th>時間</th>
                <th>科系 / 職業</th>
                <th>查看報告</th>
                <th>下載報告</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>2026-04-01</td>
                <td>資訊工程</td>
                <td><button class="view-btn">查看</button></td>
                <td><button class="download-btn">下載</button></td>
            </tr>
            <tr>
                <td>2026-04-02</td>
                <td>行銷專員</td>
                <td><button class="view-btn">查看</button></td>
                <td><button class="download-btn">下載</button></td>
            </tr>
            <tr>
                <td>2026-04-03</td>
                <td>設計師</td>
                <td><button class="view-btn">查看</button></td>
                <td><button class="download-btn">下載</button></td>
            </tr>
        </tbody>
    </table>

</div>
