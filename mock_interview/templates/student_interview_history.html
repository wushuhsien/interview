<style>
    .info-container {
        width: 900px;
        background: rgba(255, 255, 255, 0.95);
        padding: 40px 60px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        margin: 50px auto;
        backdrop-filter: blur(10px);
    }

    .info-container h2 {
        margin-top: 0;
        color: #1e3c72;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        letter-spacing: 2px;
    }

    /* 表格 */
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        overflow: hidden;
        border-radius: 10px;
    }

    th,
    td {
        padding: 14px;
        text-align: center;
    }

    th {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        font-weight: 600;
    }

    tr {
        transition: 0.3s;
    }

    tr:nth-child(even) {
        background-color: #f8faff;
    }

    tr:hover {
        background-color: #e6f0ff;
        transform: scale(1.01);
    }

    /* 按鈕 */
    .view-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 20px;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-size: 14px;
    }

    .view-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }
</style>

<div class="info-container">

    <h2>面試紀錄</h2>

    <table>
        <thead>
            <tr>
                <th>時間</th>
                <th>科系 / 職業</th>
                <th>面試類型</th>
                <th>查看報告</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>2026-04-01</td>
                <td>資訊工程</td>
                <td>模擬面試</td>
                <td><button class="view-btn">查看</button></td>
            </tr>
            <tr>
                <td>2026-04-02</td>
                <td>行銷專員</td>
                <td>正式面試</td>
                <td><button class="view-btn">查看</button></td>
            </tr>
            <tr>
                <td>2026-04-03</td>
                <td>設計師</td>
                <td>線上面試</td>
                <td><button class="view-btn">查看</button></td>
            </tr>
        </tbody>
    </table>

</div>
