<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>面試流程模擬與評估系統｜註冊</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: #f3e9dc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* 改這裡 */
            padding-top: 60px;
            /* 跟上方距離 */
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 45px 55px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            width: 520px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .system-title {
            font-size: 30px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
        }

        .interview-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: all 0.25s ease;
        }

        input:focus,
        select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 8px rgba(42, 82, 152, 0.2);
        }

        .login-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #2a5298;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .login-btn:hover {
            background-color: #1e3c72;
        }

        .register-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            font-size: 15px;
            color: #2a5298;
            background-color: #f0f4ff;
            border: 1px solid #2a5298;
            border-radius: 10px;
            cursor: pointer;
        }

        .register-btn:hover {
            background-color: #e0e8ff;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 13px;
            text-align: center;
            color: #888;
        }

        .gender-group {
            display: flex;
            gap: 25px;
            /* 每個選項間距 */
            align-items: center;
        }

        /* 性別排版 */
        .gender-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 20px;
            font-weight: normal;
        }

        #student-fields,
        #work-fields {
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-group {
            margin-top: 20px;
        }

        .next-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .next-btn:hover {
            opacity: 0.9;
        }

        .back-btn {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            color: #2a5298;
            background-color: #f0f4ff;
            border: 1px solid #2a5298;
            border-radius: 10px;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #e0e8ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="system-title">面試流程模擬與評估系統 註冊帳號</div>
        <!-- 註冊表單 -->
        <form method="POST" action="">
            <label for="username">帳號</label>
            <input type="text" name="username" placeholder="請輸入您的帳號" required>

            <label for="name">姓名</label>
            <input type="text" name="name" placeholder="請輸入您的姓名" required>

            <label for="password">密碼</label>
            <input type="password" name="password" placeholder="請輸入您的密碼" required>

            <label for="password">確認密碼</label>
            <input type="password" name="confirm_password" placeholder="確認密碼" required><br>


            <label><span class="required"></span>性別：</label>

            <div class="gender-group">
                <label>
                    <input type="radio" name="s_gender" value="男" required> 男
                </label>

                <label>
                    <input type="radio" name="s_gender" value="女"> 女
                </label>
            </div>

            <label><span class="required"></span>連絡電話：</label>
            <input type="text" name="s_phone" required pattern="(09\d{8}|0\d{1,3}\d{5,8})" title="請輸入手機（0912345678）或市話">

            <label><span class="required"></span>電子郵件：</label>
            <input type="email" name="s_email" required>

            <div class="btn-group">
                <button type="button" name="action" value="next" class="next-btn"
                    onclick="window.location.href='/login'">註冊</button>
                <button type="button" class="back-btn" onclick="window.location.href='/login'">返回登入</button>
            </div>
        </form>
        <div class="footer-text">© 面試模擬系統｜祝您面試順利</div>
    </div>
</body>
<script>
    const roleSelect = document.querySelector("select[name='role']");
    const studentFields = document.getElementById("student-fields");
    const workFields = document.getElementById("work-fields");

    function toggleFields() {
        const isStudent = roleSelect.value === "student";

        studentFields.style.display = isStudent ? "block" : "none";
        workFields.style.display = isStudent ? "none" : "block";

        document.querySelector("[name='s_type']").required = isStudent;
        document.querySelector("[name='w_type_group']").required = !isStudent;
        document.querySelector("[name='w_type_job']").required = !isStudent;
    }

    // 初始化（頁面載入時）
    toggleFields();

    // 監聽變化
    roleSelect.addEventListener("change", toggleFields);
</script>

</html>
