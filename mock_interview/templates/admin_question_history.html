<style>
    .info-container {
        width: 900px;
        background: rgba(255, 255, 255, 0.95);
        padding: 40px 60px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        margin: 50px auto;
        backdrop-filter: blur(10px);
    }

    .info-container h2 {
        margin-top: 0;
        color: #374151;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        letter-spacing: 2px;
    }

    /* 表格 */
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        overflow: hidden;
        border-radius: 10px;
    }

    th,
    td {
        padding: 14px;
        text-align: center;
    }

    th {
        background: linear-gradient(135deg, #374151, #6b7280);
        color: white;
        font-weight: 600;
    }

    tr {
        transition: 0.3s;
    }

    tr:nth-child(even) {
        background-color: #f8faff;
    }

    tr:hover {
        background: #f3f4f6;
        transform: scale(1.01);
    }

    /* 狀態 */
    .status-done {
        color: #2ecc71;
        font-weight: bold;
    }

    .status-processing {
        color: #f39c12;
        font-weight: bold;
    }

    .status-pending {
        color: #e74c3c;
        font-weight: bold;
    }

    /* 查看按鈕 */
    .view-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 20px;
        background: linear-gradient(135deg, #374151, #6b7280);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-size: 14px;
    }

    .view-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    /* 彈窗 */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
    }

    .modal-content {
        background: white;
        width: 420px;
        margin: 10% auto;
        padding: 25px 30px;
        border-radius: 14px;
        position: relative;
        animation: fadeIn 0.3s ease;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .modal-content h3 {
        text-align: center;
        color: #374151;
        margin-bottom: 20px;
    }

    .modal-content p {
        margin: 10px 0;
        font-size: 15px;
    }

    .close-btn {
        position: absolute;
        right: 15px;
        top: 10px;
        cursor: pointer;
        font-size: 18px;
        color: #888;
    }

    .close-btn:hover {
        color: #e74c3c;
    }

    img {
        border-radius: 10px;
        margin-top: 10px;
    }
</style>

<div class="info-container">
    <h2>問題紀錄</h2>

    <table>
        <tr>
            <th>時間</th>
            <th>處理狀態</th>
            <th>查看</th>
        </tr>

        <tr>
            <td>2026-04-01</td>
            <td class="status-pending">未處理</td>
            <td>
                <button class="view-btn" onclick="showDetail('2026-04-01','使用者無法登入系統，顯示404錯誤','未處理')">
                    查看
                </button>
            </td>
        </tr>

        <tr>
            <td>2026-03-30</td>
            <td class="status-done">已處理</td>
            <td>
                <button class="view-btn" onclick="showDetail('2026-03-30','PDF檔案上傳時出現錯誤','已處理')">
                    查看
                </button>
            </td>
        </tr>
    </table>
</div>

<!-- 彈窗 -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✖</span>
        <h3>問題詳細資訊</h3>
        <p><strong>時間：</strong><span id="d-time"></span></p>
        <p><strong>問題敘述：</strong><span id="d-desc"></span></p>
        <p><strong>狀態：</strong><span id="d-status"></span></p>
        <p><strong>圖片：</strong><br>
            <img id="d-img" style="max-width:100%;">
        </p>
    </div>
</div>
