<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>面試流程模擬與評估系統｜註冊</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #f3e9dc, #e2d1c3);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 45px 55px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 520px;
        }

        .system-title {
            font-size: 28px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
        }

        .interview-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #2a5298;
        }

        .login-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #2a5298;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .login-btn:hover {
            background-color: #1e3c72;
        }

        .register-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            font-size: 15px;
            color: #2a5298;
            background-color: #f0f4ff;
            border: 1px solid #2a5298;
            border-radius: 10px;
            cursor: pointer;
        }

        .register-btn:hover {
            background-color: #e0e8ff;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 13px;
            text-align: center;
            color: #888;
        }

        .role-select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .role-select:focus {
            outline: none;
            border-color: #2a5298;
        }

        .btn-group {
            margin-top: 20px;
        }

        .next-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .next-btn:hover {
            opacity: 0.9;
        }

        .back-btn {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            color: #2a5298;
            background-color: #f0f4ff;
            border: 1px solid #2a5298;
            border-radius: 10px;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #e0e8ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="system-title">面試流程模擬與評估系統 註冊帳號</div>
        <!-- 註冊表單 -->
        <form method="POST" action="">
            <label for="username">帳號</label>
            <input type="text" name="username" placeholder="請輸入您的帳號" required>

            <label for="password">密碼</label>
            <input type="password" name="password" placeholder="請輸入您的密碼" required>

            <label for="password">確認密碼</label>
            <input type="password" name="confirm_password" placeholder="確認密碼" required><br>

            <label for="role">選擇身分</label>
            <select name="role" class="role-select"> <!-- 接資料庫角色代碼 -->
                <option value="student">學生</option>
                <option value="work">職場</option>
            </select><br>

            <div class="btn-group">
                <button type="submit" name="action" value="next" class="next-btn" onclick="window.location.href='register-1.html'">下一頁</button>
                <button type="button" class="back-btn" onclick="window.location.href='login.html'">返回登入</button>
            </div>
        </form>
        <div class="footer-text">© 面試模擬系統｜祝您面試順利</div>
    </div>
</body>

</html>
